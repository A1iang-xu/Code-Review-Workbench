name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 后端 Lint（快速失败，节省时间）
  # ============================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
      - name: Install ruff
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Ruff check (app + tests)
        working-directory: ./backend
        run: ruff check app/ tests/ --output-format=github
      # mypy 暂时关闭严格模式，逐步启用
      - name: Mypy type check (best-effort)
        working-directory: ./backend
        run: mypy app/ --ignore-missing-imports || true
        continue-on-error: true

  # ============================================
  # 前端 Lint + 类型检查 + 构建
  # 关键修复：原 CI 完全没有前端流水线，前端可无声坏掉合入 main
  # ============================================
  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
      - name: ESLint
        working-directory: ./frontend
        run: npm run lint
      - name: TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ============================================
  # 后端测试（依赖 PostgreSQL + Redis）
  # ============================================
  test:
    name: Backend Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: backend-lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: code_review
          POSTGRES_USER: crw
          POSTGRES_PASSWORD: crw_ci_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e ".[dev]" -v
          pip install pytest-github-actions-annotate-failures

      - name: Database migrations
        # 关键修复：删除 || echo，迁移失败必须 fail CI
        # alembic upgrade head 本身幂等，无需容错
        # 失败时输出 ::error:: annotation 以便通过 API 诊断
        working-directory: ./backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: code_review
          POSTGRES_USER: crw
          POSTGRES_PASSWORD: crw_ci_secret
        run: |
          python -c "
          import sys, traceback
          try:
              from alembic.config import Config
              from alembic import command
              config = Config('alembic.ini')
              command.upgrade(config, 'head')
              print('Migrations completed successfully')
          except Exception as e:
              print(f'::error::Migration failed: {type(e).__name__}: {e}')
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: code_review
          POSTGRES_USER: crw
          POSTGRES_PASSWORD: crw_ci_secret
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --timeout=120

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v5
        with:
          file: ./backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ============================================
  # 安全扫描 — 依赖漏洞 + 密钥泄露 + 镜像扫描
  # 关键修复：原 CI 完全没有安全扫描，作为安全审查工具自身反讽
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # gitleaks 需要完整历史

      # Python 依赖审计
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit (Python dependencies)
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit --strict --desc

      # 前端依赖审计
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend dependencies)
        working-directory: ./frontend
        run: npm audit --omit=dev --audit-level=high || true
        continue-on-error: true

      # 密钥泄露扫描
      - name: gitleaks (secrets in git history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================
  # Build Docker images (main branch only)
  # ============================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, frontend-check, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      # 使用 docker build 而非 docker/build-push-action：
      # 1. 输出完整 pip install 日志便于诊断（buildx 会隐藏输出）
      # 2. 消除 docker/setup-buildx-action@v3 和 docker/build-push-action@v6
      #    的 Node.js 20 deprecation 警告
      - name: Build backend image
        id: build_backend
        continue-on-error: true
        run: |
          docker build --progress=plain -t crw-backend:latest ./backend 2>&1 | tee /tmp/backend_build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "::error::Backend Docker build failed (exit code $exit_code). Last 60 lines:"
            tail -60 /tmp/backend_build.log | while IFS= read -r line; do echo "::error::$line"; done
          fi
          exit $exit_code

      - name: Build frontend image
        id: build_frontend
        continue-on-error: true
        run: docker build --progress=plain -t crw-frontend:latest ./frontend

      - name: Trivy scan backend image
        if: steps.build_backend.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: crw-backend:latest
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Trivy scan frontend image
        if: steps.build_frontend.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: crw-frontend:latest
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true
