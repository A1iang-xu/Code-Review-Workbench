server {
    listen 80;
    server_name localhost;

    # 上传体积上限：单文件 1MB × 50 文件 ≈ 50MB，留余量到 64MB
    client_max_body_size 64m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;

    # 安全头片段 — 在 server 与所有嵌套 location 内重复引用，避免 nginx
    # "add_header 在嵌套 location 中覆盖父级" 的陷阱
    # 安全头清单：
    #   - X-Frame-Options: 防止点击劫持
    #   - X-Content-Type-Options: 防止 MIME 嗅探
    #   - Referrer-Policy: 限制 Referer 泄露
    #   - Content-Security-Policy: 限制脚本/样式来源
    #   - Permissions-Policy: 禁用不必要的浏览器特性
    #   - X-XSS-Protection: 旧版浏览器 XSS 过滤（现代浏览器已弃用但保留无害）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend static files (SPA support)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        # 关键修复：嵌套 location 内必须重复声明 add_header，
        # 否则父级安全头在该 location 内会被全部丢弃
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
    }

    # SSE 流式端点：长超时 + 关闭缓冲
    # 审查任务可能运行数分钟，默认 120s 超时会导致连接中断
    location ~ ^/api/v1/reviews/.+/stream$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        # SSE 客户端不希望被 nginx 缓冲
        add_header X-Accel-Buffering "no" always;
    }

    # Health check proxy（公开，只返回 ok）
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Metrics 端点：仅允许内网（Prometheus 容器）访问，禁止公网
    # 默认拒绝；如需放行特定网段，取消下方 allow 行的注释
    location /metrics {
        # allow 172.16.0.0/12;     # Docker 默认网段
        # allow 10.0.0.0/8;        # 内网
        # allow 192.168.0.0/16;    # 内网
        deny all;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
