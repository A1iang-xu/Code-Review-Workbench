version: "3.8"

services:
  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crw-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./skills:/app/skills           # Skill 热加载目录
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ============================================
  # Celery Worker (异步任务)
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crw-worker
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
      - ./skills:/app/skills
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ============================================
  # 前端开发服务器
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crw-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16       # 含向量扩展
    container_name: crw-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-code_review}
      POSTGRES_USER: ${POSTGRES_USER:-crw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crw_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crw}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: crw-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Milvus 向量数据库 (语义记忆)
  # ============================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: crw-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcddata:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: crw-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: crw-milvus
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvusdata:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: milvus run standalone
    restart: unless-stopped

  # ============================================
  # Ollama (本地模型)
  # 注意：容器启动后需要手动拉取模型，或使用以下命令：
  #   docker exec crw-ollama ollama pull qwen2.5:7b
  #   docker exec crw-ollama ollama pull deepseek-coder:6.7b
  # 模型数据持久化在 ollamadata 卷中，只需拉取一次
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: crw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped
    # 可选：自动拉取模型（首次启动时取消注释）
    # entrypoint: ["/bin/sh", "-c"]
    # command:
    #   - |
    #     ollama serve &
    #     sleep 5
    #     ollama pull qwen2.5:7b
    #     ollama pull deepseek-coder:6.7b
    #     wait

volumes:
  pgdata:
  redisdata:
  etcddata:
  miniodata:
  milvusdata:
  ollamadata: