version: "3.8"

# ============================================================
# 网络隔离：
#   - frontend-net: 仅 frontend 与 backend
#   - backend-net: backend、worker 与所有数据服务
#   数据服务（postgres、redis 等）不直接暴露给 frontend
# ============================================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

services:
  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crw-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 生产环境不再挂载源码卷（破坏镜像不可变性）
    # 仅挂载 memory_data（持久化记忆）与 skills（热加载）
    volumes:
      - ./skills:/app/skills:ro           # Skill 热加载目录（只读，安全）
      - memory_data:/app/memory_data
    networks:
      - frontend-net
      - backend-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    # 资源限制：防止单容器 OOM 拖垮整机
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Celery Worker (异步任务)
  # 解决 BackgroundTasks 在进程重启时丢失任务的问题
  # 启动: docker-compose up -d worker
  # 查看日志: docker-compose logs -f worker
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crw-worker
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./skills:/app/skills:ro
      - memory_data:/app/memory_data
    networks:
      - backend-net
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q review
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # 前端 (Nginx serving SPA + API proxy)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crw-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # PostgreSQL + pgvector
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crw-postgres
    environment:
      # 口令强制从 .env 读取，不再提供默认弱口令
      POSTGRES_DB: ${POSTGRES_DB:?必须在 .env 中配置 POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?必须在 .env 中配置 POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?必须在 .env 中配置 POSTGRES_PASSWORD}
    # 生产环境不暴露数据库端口到宿主机，仅在内网可见
    # 如需本地调试，注释下方 ports 段或改为 127.0.0.1:5432:5432
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: crw-redis
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ============================================
  # Ollama (本地模型)
  # 注意：容器启动后需要手动拉取模型：
  #   docker exec crw-ollama ollama pull qwen2.5:7b
  #   docker exec crw-ollama ollama pull deepseek-coder:6.7b
  # GPU 支持需在宿主机安装 NVIDIA Container Toolkit，
  # 并取消下方 deploy.resources.reservations.devices 注释
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: crw-ollama
    expose:
      - "11434"
    volumes:
      - ollamadata:/root/.ollama
    networks:
      - backend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        # GPU 支持（需 NVIDIA Container Toolkit）：
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: 1
        #       capabilities: [gpu]

  # ============================================
  # Jaeger — 全链路追踪 (OpenTelemetry)
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: crw-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - backend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # Prometheus — 指标采集
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: crw-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  redisdata:
  ollamadata:
  memory_data:
  prometheusdata:
