version: "3.8"

services:
  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crw-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - OLLAMA_BASE_URL=http://ollama:11434
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./skills:/app/skills           # Skill 热加载目录
      - memory_data:/app/memory_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Celery Worker (异步任务)
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crw-worker
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend/app:/app/app
      - ./skills:/app/skills
      - memory_data:/app/memory_data
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ============================================
  # 前端 (Nginx serving SPA + API proxy)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crw-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # PostgreSQL + pgvector
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crw-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-code_review}
      POSTGRES_USER: ${POSTGRES_USER:-crw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crw_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crw}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: crw-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Milvus 向量数据库 (语义记忆)
  # ============================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: crw-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcddata:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: crw-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: crw-milvus
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvusdata:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: milvus run standalone
    restart: unless-stopped

  # ============================================
  # Ollama (本地模型)
  # 注意：容器启动后需要手动拉取模型：
  #   docker exec crw-ollama ollama pull qwen2.5:7b
  #   docker exec crw-ollama ollama pull deepseek-coder:6.7b
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: crw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped

  # ============================================
  # Jaeger — 全链路追踪 (OpenTelemetry)
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: crw-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    restart: unless-stopped

  # ============================================
  # Prometheus — 指标采集
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: crw-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  etcddata:
  miniodata:
  milvusdata:
  ollamadata:
  memory_data:
  prometheusdata:
